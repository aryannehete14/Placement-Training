<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo</title>
    <link rel="stylesheet" href="demo.css">
</head>
<body>

    <div class="box">
        <h2 id="xyz">I am learning Js in Detail</h2>
        <button onclick="myDemo()"> Click Me / Revert </button>
    </div>
    
    <script src="demo.js" defer></script>

    <div class="box">
        <h3 id="h" style="background: white; color: darkred;">Make my background color black and text yellow</h3>
        <button onclick="colors()">1. Invert Colors / Revert</button>
    </div>

    <div class="box">
        <p id="element2">This text will grow bigger!</p>
        <button onclick="big()">2. Large Text / Revert</button>
    </div>

    <div class="box">
        <p id="element3">This text will get internal space (Padding)!</p>
        <button onclick="addPadding()">3. Add Padding / Revert</button>
    </div>

    <div class="box">
        <p id="element4">This text will move down (Margin)!</p>
        <button onclick="addMargin()">4. Add Margin / Revert</button>
    </div>

    <div class="box">
        <p id="element5">This text will get a frame around it!</p>
        <button onclick="addBorder()">5. Add Border / Revert</button>
    </div>

</body>
</html>
