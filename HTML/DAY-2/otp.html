<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyOtp</title>
    <style>
        body{
            background: lightgray;
            text-align: center;
        }

        span{
            color: blue;
            font-size: 34px;
        }
    </style>
</head>
<body>
    <h1>Your six digit OTP is <span></span>. Use it carefully!</h1>
    <button> Generate OTP </button>
    <script>
       let b1 = document.querySelector('button')
       b1.addEventListener('click',()=>{
         let otp = ' '
         for(i=0;i<6;i++){
            otp += Math.floor(Math.random()*10)
            document.querySelector('span').textContent = otp
         }
       })    
    </script>
</body>
</html>
